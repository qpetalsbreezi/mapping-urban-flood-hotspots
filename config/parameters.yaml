# Flood Hotspot Analysis Configuration Parameters

# Study Area
study_area:
  name: "Raleigh, NC"
  bounds:
    north: 35.9
    south: 35.7
    west: -78.8
    east: -78.5
  crs: "EPSG:4326"

# Time Period
time_period:
  start_date: "2010-01-01"
  end_date: "2025-12-31"
  analysis_window_days: 30  # Days before/after flood event

# Data Sources
data_sources:
  noaa:
    api_url: "https://www.ncdc.noaa.gov/stormevents/"
    event_types: ["Flood", "Flash Flood", "Heavy Rain"]
    min_damage: 50000  # Minimum damage threshold
  
  usgs:
    gauge_id: "02087183"  # Crabtree Creek gauge
    api_url: "https://waterservices.usgs.gov/nwis/iv/"
    flow_threshold: 1000  # cfs - flood threshold
  
  sentinel1:
    platform: "Sentinel-1"
    polarization: ["VV", "VH"]
    orbit_direction: ["ASCENDING", "DESCENDING"]
    product_type: "GRD"
  
  sentinel2:
    platform: "Sentinel-2"
    cloud_coverage: 30  # Maximum cloud coverage %
    bands: ["B02", "B03", "B04", "B08", "B11", "B12"]

# Processing Parameters
processing:
  sar:
    speckle_filter: "Lee"
    filter_size: 5
    backscatter_threshold: -12  # dB
  
  optical:
    ndwi_threshold: 0.3
    cloud_mask_buffer: 3  # pixels
  
  flood_detection:
    change_threshold: 3  # dB for SAR
    ndwi_threshold: 0.2
    min_flood_area: 100  # pixels

# Hotspot Analysis
hotspot_analysis:
  grid_resolution: 100  # meters
  frequency_threshold: 0.3  # 30% of events
  intensity_weights:
    minor: 1
    moderate: 2
    major: 3
    severe: 4

# Validation
validation:
  911_data:
    source: "Raleigh 911 Emergency Services"
    flood_keywords: ["flood", "water", "drainage"]
    buffer_distance: 100  # meters
  
  accuracy_metrics:
    - "Overall Accuracy"
    - "User's Accuracy"
    - "Producer's Accuracy"
    - "Kappa Coefficient"
